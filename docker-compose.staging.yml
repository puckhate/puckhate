services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  valkey:
    image: valkey/valkey:8
    restart: unless-stopped
    # Persistence is disabled
    command: valkey-server --save "" --appendonly no
    networks:
      - internal
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    command: >
      sh -c "uv run python manage.py migrate --noinput &&
             uv run gunicorn puckhate.wsgi:application --bind 0.0.0.0:8000"
    environment:
      CONN_MAX_AGE: ${CONN_MAX_AGE:-60}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      CURRENCYLAYER_API_KEY: ${CURRENCYLAYER_API_KEY:-}
      DB_DEFAULT_HOST: ${DB_DEFAULT_HOST:-db}
      DB_DEFAULT_NAME: ${DB_DEFAULT_NAME}
      DB_DEFAULT_PASSWORD: ${DB_DEFAULT_PASSWORD}
      DB_DEFAULT_PORT: ${DB_DEFAULT_PORT:-3306}
      DB_DEFAULT_USER: ${DB_DEFAULT_USER}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_PORT: ${EMAIL_PORT:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-1}
      GUNICORN_CMD_ARGS: ${GUNICORN_CMD_ARGS:---workers 3}
      HOCKEYTECH_API_KEY: ${HOCKEYTECH_API_KEY:-}
      HOCKEYTECH_PLAYER_ID: ${HOCKEYTECH_PLAYER_ID:-}
      HOCKEYTECH_SEASON_ID: ${HOCKEYTECH_SEASON_ID:-}
      HOCKEYTECH_STARTING_GOALS: ${HOCKEYTECH_STARTING_GOALS:-}
      MEDIA_ROOT: /data/media
      NUM_PROXIES: ${NUM_PROXIES:-2}
      PRIVATE_MEDIA_ROOT: /data/private_media
      ROBOTS_ALLOW: ${ROBOTS_ALLOW:-0}
      SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-0}
      SECURE_PROXY_SSL_HEADER: ${SECURE_PROXY_SSL_HEADER:-1}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-1}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-1}
      SITE_URL: ${SITE_URL:-https://staging.puckhate.com}
      VALKEY_URL: ${VALKEY_URL:-redis://valkey:6379/0}
    volumes:
      - backend-media:/data/media
      - backend-private-media:/data/private_media
    expose:
      - 8000
    networks:
      - internal
      - proxy
    labels:
      # Run scheduled jobs
      ofelia.enabled: "false"
      # Hourly orphan/expired receipt cleanup
      ofelia.job-exec.cleanup-receipts.schedule: "@every 1h"
      ofelia.job-exec.cleanup-receipts.command: "uv run python manage.py cleanup_orphan_receipts"
      # Nightly exchange rate refresh
      ofelia.job-exec.update-exchange-rate.schedule: "0 0 3 * * *" # Run at 03:00 (UTC) every day
      ofelia.job-exec.update-exchange-rate.command: "uv run python manage.py update_exchange_rate"
      # Nightly cleanup of orphaned charities
      ofelia.job-exec.cleanup-charities.schedule: "0 30 3 * * *" # Run at 03:30 (UTC) every day
      ofelia.job-exec.cleanup-charities.command: "uv run python manage.py cleanup_orphan_charities"
      # Refresh the tracked player's goal total every 5 minutes
      ofelia.job-exec.update-goals-scored.schedule: "@every 5m"
      ofelia.job-exec.update-goals-scored.command: "uv run python manage.py update_goals_scored"
      # Hourly summary of donations that entered the approval queue
      ofelia.job-exec.hourly-email-summary.schedule: "0 0 * * * *" # Run at the top of every hour
      ofelia.job-exec.hourly-email-summary.command: "uv run python manage.py hourly_email_summary"
      # Daily summary of the total pending-approval backlog
      ofelia.job-exec.daily-email-summary.schedule: "0 0 2 * * *" # Run at 02:00 (UTC) every day
      ofelia.job-exec.daily-email-summary.command: "uv run python manage.py daily_email_summary"
      # Trafik configuration
      traefik.enable: "true"
      traefik.docker.network: "proxy"
      # HTTP to HTTPS redirect
      traefik.http.routers.puckhate-staging-http.entrypoints: "web"
      traefik.http.routers.puckhate-staging-http.rule: "Host(`staging.puckhate.com`)"
      traefik.http.routers.puckhate-staging-http.middlewares: puckhate-staging-redirect-https
      traefik.http.middlewares.puckhate-staging-redirect-https.redirectscheme.scheme: "https"
      # Endpoint registration
      traefik.http.routers.puckhate-staging.entrypoints: "websecure"
      traefik.http.routers.puckhate-staging.rule: "Host(`staging.puckhate.com`)"
      traefik.http.routers.puckhate-staging.tls: "true"
      traefik.http.routers.puckhate-staging.tls.certresolver: "le"
      traefik.http.routers.puckhate-staging.middlewares: "puckhate-staging-bodylimit,puckhate-staging-noindex"
      traefik.http.middlewares.puckhate-staging-bodylimit.buffering.maxRequestBodyBytes: "12582912" # Hard cap on request body size (≈12MB)
      traefik.http.middlewares.puckhate-staging-noindex.headers.customresponseheaders.X-Robots-Tag: "noindex, nofollow, noai, noimageai" # Keep staging out of search / AI indexes
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy

  scheduler:
    image: mcuadros/ofelia:latest
    restart: unless-stopped
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal
    depends_on:
      - backend

volumes:
  db-data:
  backend-media:
  backend-private-media:

networks:
  proxy:
    name: proxy
    external: true
  internal:
