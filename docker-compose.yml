services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-puckcurl}
      MYSQL_USER: ${MYSQL_USER:-puckcurl}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-puckcurl}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-p${MYSQL_ROOT_PASSWORD:-root}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  valkey:
    image: valkey/valkey:8
    # Persistence is disabled
    command: valkey-server --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
      target: backend
    command: uv run python manage.py runserver 0.0.0.0:8000
    environment:
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      CURRENCYLAYER_API_KEY: ${CURRENCYLAYER_API_KEY:-}
      DB_DEFAULT_HOST: ${DB_DEFAULT_HOST:-db}
      DB_DEFAULT_NAME: ${DB_DEFAULT_NAME:-puckcurl}
      DB_DEFAULT_PASSWORD: ${DB_DEFAULT_PASSWORD:-puckcurl}
      DB_DEFAULT_PORT: ${DB_DEFAULT_PORT:-3306}
      DB_DEFAULT_USER: ${DB_DEFAULT_USER:-puckcurl}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure-change-me}
      HOCKEYTECH_API_KEY: ${HOCKEYTECH_API_KEY:-}
      HOCKEYTECH_PLAYER_ID: ${HOCKEYTECH_PLAYER_ID:-}
      HOCKEYTECH_SEASON_ID: ${HOCKEYTECH_SEASON_ID:-}
      HOCKEYTECH_STARTING_GOALS: ${HOCKEYTECH_STARTING_GOALS:-}
      VALKEY_URL: ${VALKEY_URL:-redis://valkey:6379/0}
    volumes:
      - ./backend:/app:cached
    ports:
      - "8000:8000"
    labels:
      # Hourly orphan/expired receipt cleanup
      ofelia.enabled: "true"
      ofelia.job-exec.cleanup-receipts.schedule: "@every 1h"
      ofelia.job-exec.cleanup-receipts.command: "uv run python manage.py cleanup_orphan_receipts"
      # Nightly exchange rate refresh
      ofelia.job-exec.update-exchange-rate.schedule: "0 0 3 * * *"
      ofelia.job-exec.update-exchange-rate.command: "uv run python manage.py update_exchange_rate"
      # Nightly cleanup of orphaned charities
      ofelia.job-exec.cleanup-charities.schedule: "0 30 3 * * *"
      ofelia.job-exec.cleanup-charities.command: "uv run python manage.py cleanup_orphan_charities"
      # Refresh the tracked player's goal total every 5 minutes
      ofelia.job-exec.update-goals-scored.schedule: "@every 5m"
      ofelia.job-exec.update-goals-scored.command: "uv run python manage.py update_goals_scored"
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    command: npm run dev -- --host
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://backend:8000}
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  scheduler:
    image: mcuadros/ofelia:latest
    restart: unless-stopped
    command: daemon --docker
    profiles:
      - scheduler
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - backend

volumes:
  mysql-data:
